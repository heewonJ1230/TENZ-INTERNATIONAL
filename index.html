<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TENZ INTERNATIONAL - 재택근무 체크인</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', 'Inter', sans-serif;
    background: #f3f4f6;
    color: #1f2937;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== TOP BAR ===== */
  .topbar {
    background: #1e293b;
    color: #fff;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    z-index: 100;
  }

  .topbar-logo {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2.5px;
    color: #fff;
  }

  .topbar-logo span {
    color: #60a5fa;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .topbar-user {
    font-size: 14px;
    color: #cbd5e1;
  }

  .topbar-user strong {
    color: #fff;
    text-decoration: underline;
    text-underline-offset: 3px;
    font-weight: 500;
  }

  .topbar-time {
    font-family: 'Inter', monospace;
    font-size: 13px;
    color: #94a3b8;
    background: rgba(255,255,255,0.08);
    padding: 6px 14px;
    border-radius: 6px;
  }

  /* ===== LAYOUT ===== */
  .layout {
    display: flex;
    flex: 1;
    min-height: calc(100vh - 56px);
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: 280px;
    background: #fff;
    border-right: 1px solid #e5e7eb;
    display: flex;
    flex-direction: column;
  }

  .sidebar-profile {
    padding: 28px 24px 20px;
    border-bottom: 1px solid #e5e7eb;
  }

  .profile-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #3b82f6;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .profile-name {
    font-size: 16px;
    font-weight: 600;
    color: #1f2937;
    margin-bottom: 2px;
  }

  .profile-dept {
    font-size: 12px;
    color: #9ca3af;
  }

  .sidebar-checkin {
    padding: 24px;
    border-bottom: 1px solid #e5e7eb;
  }

  .checkin-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .checkin-btn.ready {
    background: #3b82f6;
    color: #fff;
  }

  .checkin-btn.ready:hover {
    background: #2563eb;
    box-shadow: 0 4px 14px rgba(59,130,246,0.3);
    transform: translateY(-1px);
  }

  .checkin-btn.active {
    background: #ef4444;
    color: #fff;
  }

  .checkin-btn.active:hover {
    background: #dc2626;
  }

  .checkin-timer {
    text-align: center;
    margin-top: 16px;
    display: none;
  }

  .checkin-timer.show {
    display: block;
  }

  .timer-value {
    font-family: 'Inter', monospace;
    font-size: 32px;
    font-weight: 700;
    color: #1f2937;
    letter-spacing: 2px;
  }

  .timer-label {
    font-size: 12px;
    color: #9ca3af;
    margin-top: 4px;
  }

  .checkin-status {
    display: none;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    padding: 10px 14px;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 8px;
  }

  .checkin-status.show {
    display: flex;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(34,197,94,0); }
  }

  .status-text {
    font-size: 13px;
    font-weight: 500;
    color: #16a34a;
  }

  .status-time {
    font-size: 12px;
    color: #6b7280;
    margin-left: auto;
    font-family: 'Inter', monospace;
  }

  .sidebar-menu {
    padding: 16px 12px;
    flex: 1;
  }

  .menu-label {
    font-size: 11px;
    font-weight: 600;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 8px 12px;
    margin-bottom: 4px;
  }

  .menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 400;
    color: #4b5563;
    cursor: pointer;
    transition: all 0.15s;
  }

  .menu-item:hover {
    background: #f3f4f6;
    color: #1f2937;
  }

  .menu-item.active {
    background: #eff6ff;
    color: #2563eb;
    font-weight: 500;
  }

  .menu-icon {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.6;
  }

  .menu-item.active .menu-icon { opacity: 1; }

  /* ===== MAIN ===== */
  .main {
    flex: 1;
    padding: 32px;
    overflow-y: auto;
  }

  .main-header {
    margin-bottom: 28px;
  }

  .main-header h2 {
    font-size: 22px;
    font-weight: 700;
    color: #1f2937;
    margin-bottom: 6px;
  }

  .main-header p {
    font-size: 14px;
    color: #9ca3af;
  }

  .summary-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .summary-card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 24px;
  }

  .summary-card-label {
    font-size: 12px;
    color: #9ca3af;
    margin-bottom: 8px;
    font-weight: 500;
  }

  .summary-card-value {
    font-family: 'Inter', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: #1f2937;
  }

  .summary-card-sub {
    font-size: 12px;
    color: #6b7280;
    margin-top: 4px;
  }

  .work-log {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    overflow: hidden;
  }

  .work-log-header {
    padding: 20px 24px;
    border-bottom: 1px solid #e5e7eb;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .work-log-title {
    font-size: 15px;
    font-weight: 600;
  }

  .work-log-badge {
    font-size: 12px;
    color: #6b7280;
    background: #f3f4f6;
    padding: 4px 12px;
    border-radius: 20px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 14px 24px;
    background: #f9fafb;
    border-bottom: 1px solid #e5e7eb;
  }

  td {
    padding: 16px 24px;
    font-size: 14px;
    color: #4b5563;
    border-bottom: 1px solid #f3f4f6;
  }

  .log-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
  }

  .log-status.completed {
    background: #f0fdf4;
    color: #16a34a;
  }

  .log-status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22c55e;
  }

  .sidebar-footer {
    padding: 16px 24px;
    border-top: 1px solid #e5e7eb;
    font-size: 11px;
    color: #9ca3af;
    text-align: center;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <span>TENZ</span> INTERNATIONAL
  </div>
  <div class="topbar-right">
    <div class="topbar-user">
      <strong>정희원 님</strong>
    </div>
    <div class="topbar-time" id="topbarTime">--:--:--</div>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-profile">
      <div class="profile-avatar">정</div>
      <div class="profile-name">정희원</div>
      <div class="profile-dept">기획팀 · 재택근무</div>
    </div>

    <div class="sidebar-checkin">
      <button class="checkin-btn ready" id="checkinBtn" onclick="toggleCheckin()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3" id="btnIconShape"/>
        </svg>
        <span id="btnText">체크인</span>
      </button>

      <div class="checkin-timer" id="timerArea">
        <div class="timer-value" id="timerDisplay">00:00</div>
        <div class="timer-label">근무 시간</div>
      </div>

      <div class="checkin-status" id="statusArea">
        <div class="status-dot"></div>
        <span class="status-text">체크인</span>
        <span class="status-time" id="checkinTime">--:--</span>
      </div>
    </div>

    <div class="sidebar-menu">
      <div class="menu-label">메뉴</div>
      <div class="menu-item active" onclick="setActiveMenu(this)">
        <div class="menu-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        업무 기록
      </div>
      <div class="menu-item" onclick="setActiveMenu(this)">
        <div class="menu-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        내 정보
      </div>
      <div class="menu-item" onclick="setActiveMenu(this)">
        <div class="menu-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        개인 휴게 관리
      </div>
    </div>

    <div class="sidebar-footer">
      © 2026 TENZ INTERNATIONAL
    </div>
  </div>

  <div class="main">
    <div class="main-header">
      <h2>업무 기록</h2>
      <p>재택근무 출퇴근 및 업무 현황을 확인합니다.</p>
    </div>

    <div class="summary-cards">
      <div class="summary-card">
        <div class="summary-card-label">이번 주 근무시간</div>
        <div class="summary-card-value">8<span style="font-size:16px;color:#9ca3af">시간</span> 05<span style="font-size:16px;color:#9ca3af">분</span></div>
        <div class="summary-card-sub">목표: 20시간</div>
      </div>
      <div class="summary-card">
        <div class="summary-card-label">이번 달 근무일수</div>
        <div class="summary-card-value">1<span style="font-size:16px;color:#9ca3af">일</span></div>
        <div class="summary-card-sub">잔여: 21일</div>
      </div>
      <div class="summary-card">
        <div class="summary-card-label">평균 근무시간</div>
        <div class="summary-card-value">4<span style="font-size:16px;color:#9ca3af">시간</span> 02<span style="font-size:16px;color:#9ca3af">분</span></div>
        <div class="summary-card-sub">일 기준</div>
      </div>
    </div>

    <div class="work-log">
      <div class="work-log-header">
        <div class="work-log-title">최근 근무 기록</div>
        <div class="work-log-badge">2026년 4월</div>
      </div>
      <table>
        <thead>
          <tr>
            <th>날짜</th>
            <th>체크인</th>
            <th>체크아웃</th>
            <th>근무시간</th>
            <th>상태</th>
          </tr>
        </thead>
        <tbody id="logTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  // Current time
  function updateTopbarTime() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('topbarTime').textContent = h + ':' + m + ':' + s;
  }
  setInterval(updateTopbarTime, 1000);
  updateTopbarTime();

  // Check-in
  let isCheckedIn = false;
  let startTime = null;
  let timerInterval = null;

  function toggleCheckin() {
    if (!isCheckedIn) {
      isCheckedIn = true;
      startTime = new Date();

      document.getElementById('checkinBtn').className = 'checkin-btn active';
      document.getElementById('btnText').textContent = '체크아웃';
      document.getElementById('btnIconShape').setAttribute('points', '6 4 10 4 10 20 6 20');
      
      // Add pause bars
      const svg = document.getElementById('btnIconShape').parentElement;
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', '14'); rect.setAttribute('y', '4');
      rect.setAttribute('width', '4'); rect.setAttribute('height', '16');
      rect.setAttribute('fill', 'currentColor'); rect.setAttribute('id', 'pauseBar');
      svg.appendChild(rect);

      document.getElementById('timerArea').className = 'checkin-timer show';
      document.getElementById('statusArea').className = 'checkin-status show';

      const h = String(startTime.getHours()).padStart(2, '0');
      const m = String(startTime.getMinutes()).padStart(2, '0');
      document.getElementById('checkinTime').textContent = h + ':' + m;

      timerInterval = setInterval(updateTimer, 1000);
      updateTimer();
    } else {
      isCheckedIn = false;
      clearInterval(timerInterval);

      const endTime = new Date();
      addLogEntry(startTime, endTime);

      document.getElementById('checkinBtn').className = 'checkin-btn ready';
      document.getElementById('btnText').textContent = '체크인';
      document.getElementById('btnIconShape').setAttribute('points', '5 3 19 12 5 21 5 3');
      
      const pauseBar = document.getElementById('pauseBar');
      if (pauseBar) pauseBar.remove();

      document.getElementById('timerArea').className = 'checkin-timer';
      document.getElementById('statusArea').className = 'checkin-status';
      document.getElementById('timerDisplay').textContent = '00:00';

      startTime = null;
    }
  }

  function updateTimer() {
    if (!startTime) return;
    const diff = Math.floor((new Date() - startTime) / 1000);
    const hours = Math.floor(diff / 3600);
    const minutes = Math.floor((diff % 3600) / 60);
    document.getElementById('timerDisplay').textContent =
      String(hours).padStart(2, '0') + ':' + String(minutes).padStart(2, '0');
  }

  function addLogEntry(start, end) {
    const diff = Math.floor((end - start) / 1000);
    const h = Math.floor(diff / 3600);
    const m = Math.floor((diff % 3600) / 60);
    const tbody = document.getElementById('logTableBody');
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${formatDate(start)}</td>
      <td>${formatTime(start)}</td>
      <td>${formatTime(end)}</td>
      <td>${h}시간 ${m}분</td>
      <td><span class="log-status completed"><span class="log-status-dot"></span>완료</span></td>
    `;
    tbody.insertBefore(row, tbody.firstChild);
  }

  function formatDate(d) {
    const days = ['일','월','화','수','목','금','토'];
    return (d.getMonth()+1) + '/' + d.getDate() + ' (' + days[d.getDay()] + ')';
  }

  function formatTime(d) {
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }

  // Seed data
  (function() {
    const tbody = document.getElementById('logTableBody');
    const logs = [
      { date: '4/1 (수)', ci: '08:01', co: '12:03', dur: '4시간 02분' },
      { date: '3/31 (화)', ci: '08:02', co: '12:05', dur: '4시간 03분' },
      { date: '3/28 (금)', ci: '08:00', co: '12:00', dur: '4시간 00분' },
      { date: '3/27 (목)', ci: '08:05', co: '11:58', dur: '3시간 53분' },
      { date: '3/26 (수)', ci: '08:01', co: '12:10', dur: '4시간 09분' },
      { date: '3/25 (화)', ci: '08:00', co: '12:02', dur: '4시간 02분' },
    ];
    logs.forEach(l => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${l.date}</td><td>${l.ci}</td><td>${l.co}</td><td>${l.dur}</td>
        <td><span class="log-status completed"><span class="log-status-dot"></span>완료</span></td>
      `;
      tbody.appendChild(row);
    });
  })();

  function setActiveMenu(el) {
    document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
  }
</script>
</body>
</html>
